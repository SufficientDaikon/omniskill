name: reviewer
version: 1.0.0
description: "Use when reviewing implementation output against a specification for compliance. Generates a comprehensive HTML/CSS report comparing code to spec requirements. Triggers on tasks involving spec compliance review, implementation verification, quality auditing, or when user asks to review against spec or verify implementation."
author: tahaa
license: MIT
platforms: [claude-code, copilot-cli, cursor, windsurf, antigravity]
tags: ["spec-driven-development"]
triggers:
  keywords: ["review against spec", "verify implementation", "spec compliance review", "implementation verification", "quality auditing", "user asks to "review against spec" or "verify implementation""]
  patterns: []
priority: P1
