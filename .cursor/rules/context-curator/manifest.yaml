name: context-curator
version: 1.0.0
description: "Universal context curation skill for multi-agent pipeline handoffs. Performs context summarization, role-based filtering, smart chunking, pipeline state management, handoff validation, context budget tracking, and dashboard generation."
author: tahaa
license: MIT
platforms: [claude-code, copilot-cli, cursor, windsurf, antigravity]
tags:
  [
    "context-management",
    "pipeline-orchestration",
    "handoff-validation",
    "multi-agent",
    "spec-driven-development",
  ]
triggers:
  keywords:
    [
      "curate context",
      "context brief",
      "pipeline handoff",
      "resume pipeline",
      "refresh context",
      "pipeline dashboard",
      "validate handoff",
      "context budget",
    ]
  patterns: ["*handoff*", "*pipeline state*", "*context brief*"]
priority: P1
