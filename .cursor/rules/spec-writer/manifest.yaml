name: spec-writer
version: 1.0.0
description: "Use when transforming plans, ideas, or feature descriptions into comprehensive implementable specifications. Triggers on tasks involving requirements engineering, spec creation, user story writing, acceptance criteria definition, or when the user asks to write a spec, create a specification, or turn this plan into a spec."
author: tahaa
license: MIT
platforms: [claude-code, copilot-cli, cursor, windsurf, antigravity]
tags: ["spec-driven-development"]
triggers:
  keywords: ["write a spec", "create a specification", "turn this plan into a spec", "requirements engineering", "spec creation", "user story writing", "acceptance criteria definition", "the user asks to "write a spec"", ""create a specification"", "or "turn this plan into a spec""]
  patterns: []
priority: P1
