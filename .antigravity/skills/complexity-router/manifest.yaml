# Complexity Router Skill Manifest

name: complexity-router
version: 1.0.0
description: "Intelligent task classification and routing engine for optimal model/agent selection"
author: tahaa
license: MIT

platforms:
  - claude-code
  - copilot-cli
  - cursor
  - windsurf
  - antigravity

tags:
  - routing
  - classification
  - cost-optimization
  - model-selection
  - orchestration
  - meta

triggers:
  keywords:
    - "classify this task"
    - "route this request"
    - "what complexity is this"
    - "which model should handle this"
  patterns:
    - "auto-triggered on all requests"

# P0 = Critical infrastructure, auto-activated
priority: P0

resources:
  - path: resources/complexity-signals.md
    type: reference
    load: always
  - path: resources/routing-table.md
    type: decision-tree
    load: always
