# Knowledge Sources Skill Manifest

name: knowledge-sources
version: 1.0.0
description: "Pluggable knowledge base manager for syncing and searching external content sources"
author: tahaa
license: MIT

platforms:
  - claude-code
  - copilot-cli
  - cursor
  - windsurf
  - antigravity

tags:
  - knowledge-base
  - content-sync
  - external-docs
  - search
  - integration

triggers:
  keywords:
    - "sync knowledge sources"
    - "add knowledge source"
    - "search external docs"
    - "update knowledge cache"
  patterns:
    - "sync * from *"
    - "search knowledge for *"

priority: P1

resources:
  - path: resources/source-types.md
    type: reference
    load: on-demand
  - path: templates/source-config.yaml
    type: template
    load: on-demand
