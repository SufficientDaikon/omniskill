# OMNISKILL MCP Server Integration Catalog
# Curated list of MCP servers for AI coding assistants.
# See: docs/integration-catalog.md for full documentation.
#
# FR-CAT-001 through FR-CAT-005

schema_version: "1.0"

servers:
  # ── Core ────────────────────────────────────────────────────────

  - name: filesystem
    package: "@modelcontextprotocol/server-filesystem"
    category: core
    description: "Read, write, and manage local files and directories via MCP"
    install-command: "npx -y @modelcontextprotocol/server-filesystem"
    server-type: stdio
    args-template: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/path/to/allowed/dir"]
    required-env: []
    recommended-for:
      skills: [backend-development, frontend-design]
      agents: [implementer-agent]
      bundles: [web-dev-kit, django-kit]
    tags: [files, filesystem, read, write, directory]
    docs-url: "https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem"

  - name: fetch
    package: "@modelcontextprotocol/server-fetch"
    category: core
    description: "HTTP fetch — retrieve web content and API responses via MCP"
    install-command: "npx -y @modelcontextprotocol/server-fetch"
    server-type: stdio
    args-template: ["npx", "-y", "@modelcontextprotocol/server-fetch"]
    required-env: []
    recommended-for:
      skills: [backend-development]
      agents: []
      bundles: [web-dev-kit]
    tags: [http, fetch, web, api, request]
    docs-url: "https://github.com/modelcontextprotocol/servers/tree/main/src/fetch"

  - name: memory
    package: "@modelcontextprotocol/server-memory"
    category: core
    description: "Persistent key-value memory store across sessions for context retention"
    install-command: "npx -y @modelcontextprotocol/server-memory"
    server-type: stdio
    args-template: ["npx", "-y", "@modelcontextprotocol/server-memory"]
    required-env: []
    recommended-for:
      skills: [context-curator]
      agents: [context-curator-agent]
      bundles: [sdd-kit]
    tags: [memory, persistence, context, key-value, storage]
    docs-url: "https://github.com/modelcontextprotocol/servers/tree/main/src/memory"

  # ── Development ─────────────────────────────────────────────────

  - name: github
    package: "@modelcontextprotocol/server-github"
