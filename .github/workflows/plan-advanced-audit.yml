name: Plan Advanced Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'

jobs:
  meta-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run meta audit
        run: |
          python "plans for omniskill v 3/scripts/meta_audit.py" --dir "plans for omniskill v 3"
