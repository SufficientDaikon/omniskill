# OMNISKILL Root Manifest
# This file registers all skills, bundles, agents, and pipelines in the framework.

name: omniskill
version: 2.0.0
description: "Universal AI Agent & Skills Framework with Enforced Intelligence — guardrails, sequential thinking, pipeline orchestration"
author: tahaa
license: MIT
repository: https://github.com/SufficientDaikon/omniskill

