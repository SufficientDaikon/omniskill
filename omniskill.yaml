    version: 1.0.0
    type: core
  - name: sequential-thinking
    path: synapses/sequential-thinking
    version: 1.0.0
    type: core

# All registered pipelines
pipelines:
  - name: sdd-pipeline
    path: pipelines/sdd-pipeline.yaml
    trigger: "build feature * from scratch"
  - name: ux-pipeline
    path: pipelines/ux-pipeline.yaml
    trigger: "design feature *"
  - name: debug-pipeline
    path: pipelines/debug-pipeline.yaml
    trigger: "fix bug *"
  - name: skill-factory
    path: pipelines/skill-factory.yaml
    trigger: "create a new skill for *"
  - name: full-product
    path: pipelines/full-product.yaml
    trigger: "build product * end-to-end"
  - name: batch-sdd-pipeline
    path: pipelines/batch-sdd-pipeline.yaml
    trigger: "batch implement plans in *"
  - name: dissect-to-skill
    path: pipelines/dissect-to-skill.yaml
    trigger: "dissect codebase * into skills"
  - name: skill-upgrade
    path: pipelines/skill-upgrade.yaml
    trigger: "upgrade skill * to gold"

# Supported platforms
platforms:
  - id: claude-code
    adapter: adapters/claude-code
    target: "~/.claude/skills/"
  - id: copilot-cli
    adapter: adapters/copilot-cli
    target: "~/.copilot/skills/"
  - id: cursor
    adapter: adapters/cursor
    target: ".cursor/rules/"
  - id: windsurf
    adapter: adapters/windsurf
    target: ".windsurfrules"
  - id: antigravity
    adapter: adapters/antigravity
    target: ".antigravity/skills/"

# MCP Server Integration Catalog
catalog:
  path: catalog/mcp-servers.yaml
  schema: schemas/mcp-catalog.schema.yaml
