# All registered bundles
bundles:
  - name: godot-kit
    path: bundles/godot-kit
    skills:
      [
        godot-best-practices,
        godot-debugging,
        godot-gdscript-mastery,
        godot-gdscript-patterns,
        godot-particles,
      ]

  - name: web-dev-kit
    path: bundles/web-dev-kit
    skills:
      [
        frontend-design,
        react-best-practices,
        vercel-react-best-practices,
        server-component-patterns,
        web-design-guidelines,
        backend-development,
        i18n-strategy,
        error-handling-architecture,
        guard-chain,
        prisma-orm-patterns,
      ]

  - name: ux-design-kit
    path: bundles/ux-design-kit
    skills:
      [
        ui-ux-designer,
        ui-visual-design,
        ux-interaction-design,
        ux-research,
        ux-test-suite,
        wireframing,
        info-architecture,
      ]

  - name: django-kit
    path: bundles/django-kit
    skills:
      [
        django-expert,
        django-framework,
        django-orm-patterns,
        django-rest-framework,
      ]

  - name: sdd-kit
    path: bundles/sdd-kit
    skills: [spec-writer, implementer, reviewer, design-handoff, design-review, context-curator]

  - name: testing-kit
    path: bundles/testing-kit
    skills:
      [
        vitest-unit-patterns,
        e2e-testing-patterns,
        qa-test-planner,
        webapp-testing,
        systematic-debugging,
      ]

  - name: mobile-kit
    path: bundles/mobile-kit
    skills: [mobile-design, capacitor-best-practices]

  - name: meta-kit
    path: bundles/meta-kit
    skills:
      [writing-skills, find-skills, skills-index, packager, prompt-architect]

  - name: prompts-chat-kit
    path: bundles/prompts-chat-kit
    skills:
      [
        plugin-system,
        fluent-builder,
        content-quality-gate,
        template-variables,
        white-label-config,
        claude-plugin-archetype,
        yaml-prompt-library,
        event-webhooks,
        content-deduplication,
        sdk-beside-app,
        guard-chain,
        error-handling-architecture,
        prisma-orm-patterns,
        async-side-effects,
        content-moderation-pipeline,
        lazy-import-patterns,
        singleton-patterns,
      ]

  - name: security-kit
    path: bundles/security-kit
    skills:
      [
        guard-chain,
        event-webhooks,
        error-handling-architecture,
        structured-logging,
      ]

  - name: data-layer-kit
    path: bundles/data-layer-kit
    skills:
      [
        prisma-orm-patterns,
        singleton-patterns,
        content-deduplication,
        backend-development,
      ]

  - name: devops-kit
    path: bundles/devops-kit
    skills: [docker-production-build, structured-logging]

