# Validation schema for the OMNISKILL MCP server catalog.
# FR-CAT-006, FR-CAT-060

schema_version: "1.0"
description: "Validation schema for the OMNISKILL MCP server catalog"

root_fields:
  schema_version:
    type: string
    required: true
  servers:
    type: list
    required: true
    min_items: 1

server_entry:
  required_fields:
    name:
      type: string
      pattern: "^[a-z][a-z0-9-]*$"
      description: "Unique kebab-case server identifier"
    package:
      type: string
      description: "Package name (npm or pip)"
    category:
      type: string
      allowed_values: [core, development, database, research, design, ai, cloud, communication]
    description:
      type: string
      min_length: 10
      max_length: 300
    install-command:
      type: string
      description: "Shell command to install the server package"
    tags:
      type: list
      min_items: 1
      item_type: string

  optional_fields:
    required-env:
      type: list
      item_type: object
      item_schema:
        required:
          name: { type: string }
          description: { type: string }
    recommended-for:
      type: object
      optional_children:
        skills: { type: list, item_type: string }
        agents: { type: list, item_type: string }
        bundles: { type: list, item_type: string }
    docs-url:
      type: string
    server-type:
      type: string
      allowed_values: [stdio, sse]
      default: "stdio"
    args-template:
      type: list
      item_type: string
